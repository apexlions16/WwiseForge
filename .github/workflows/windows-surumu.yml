name: Windows sürümü oluşturma

on:
  workflow_dispatch:
  pull_request:
    types: [synchronize, reopened]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

concurrency:
  group: windows-surumu
  cancel-in-progress: false

jobs:
  windows-surumu:
    name: Windows EXE oluşturma ve yayımlama
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'asama-0-yayin-tetikleyici'
    runs-on: windows-latest

    steps:
      - name: Kaynak kodu alma
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Python ortamını hazırlama
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Aşama 0 kaynak güncellemesini uygulama
        run: |
          if (Test-Path ".github/guncellemeler/asama0_guncelle.py") {
            python ".github/guncellemeler/asama0_guncelle.py"
          }
          python -m py_compile "WwiseForge.py"

      - name: Kaynak ve README değişikliklerini kaydetme
        run: |
          $degisiklikler = git status --porcelain -- "WwiseForge.py" "README.md"
          if ($degisiklikler) {
            git config user.name "WwiseForge Yayın Botu"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "WwiseForge.py" "README.md"
            git commit -m "Aşama 0 sürüm bilgisi ve README güncellemesi"
            git push origin HEAD:main
          }
          else {
            "Kaynak ve README zaten güncel."
          }

      - name: Sürüm bilgisini okuma
        run: |
          $eslesme = Select-String -Path "WwiseForge.py" -Pattern '^UYGULAMA_SURUMU = "([^"]+)"$'
          if (-not $eslesme) {
            throw "Kaynak kodda uygulama sürümü bulunamadı."
          }

          $surum = $eslesme.Matches[0].Groups[1].Value
          "SURUM=$surum" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Sürüm bilgisi okundu: $surum"

      - name: Mevcut sürümü sorgulama
        id: surum_denetimi
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v$env:SURUM" --repo $env:GITHUB_REPOSITORY

      - name: Derleme araçlarını kurma
        if: steps.surum_denetimi.outcome != 'success'
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 PyInstaller

      - name: Python sözdizimini yeniden denetleme
        if: steps.surum_denetimi.outcome != 'success'
        run: |
          python -m py_compile WwiseForge.py

      - name: Windows EXE dosyasını oluşturma
        if: steps.surum_denetimi.outcome != 'success'
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "WwiseForge-v$env:SURUM" `
            WwiseForge.py

          $exeYolu = "dist/WwiseForge-v$env:SURUM.exe"
          if (-not (Test-Path $exeYolu)) {
            throw "Windows EXE dosyası oluşturulamadı."
          }

      - name: Türkçe sürüm notlarını hazırlama
        if: steps.surum_denetimi.outcome != 'success'
        run: |
          @"
          ## WwiseForge v$env:SURUM

          Bu sürüm, WwiseForge uygulamasının ilk Windows test sürümüdür.

          ### Bu sürümde

          - Uygulama sürüm numarası pencere başlığına ve durum çubuğuna eklendi.
          - Windows için tek dosyalık EXE derleme düzeni kuruldu.
          - Derleme öncesinde Python sözdizimi denetimi eklendi.
          - Sürüm adı ve yayımlanan EXE dosyası sürüm numarasıyla eşleştirildi.
          - Türkçe geliştirme, issue ve sürüm notu düzeni kalıcı hâle getirildi.

          ### Takip

          - Issue #2: Aşama 0 — Sürümleme ve Windows EXE yayın altyapısı

          ### Test notu

          EXE dosyasını Windows üzerinde çalıştırın ve uygulama başlığında `v$env:SURUM` bilgisinin göründüğünü doğrulayın. Sonraki geliştirme aşamasına geçilmeden önce bu sürüm kullanıcı onayı bekleyecektir.
          "@ | Set-Content -Path "surum-notlari.md" -Encoding utf8

      - name: GitHub sürümünü yayımlama
        if: steps.surum_denetimi.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$env:SURUM" `
            "dist/WwiseForge-v$env:SURUM.exe" `
            --repo $env:GITHUB_REPOSITORY `
            --target main `
            --title "WwiseForge v$env:SURUM — İlk test sürümü" `
            --notes-file "surum-notlari.md"