name: Windows sürümü oluşturma

on:
  workflow_dispatch:
  create:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened]
  push:
    tags:
      - "v*"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

concurrency:
  group: windows-surumu
  cancel-in-progress: false

jobs:
  windows-surumu:
    name: Windows EXE oluşturma ve yayımlama
    if: (github.event_name != 'issue_comment' || (github.event.issue.number == 2 && contains(github.event.comment.body, '[AŞAMA-0-YAYINLA]'))) && (github.event_name != 'pull_request_target' || github.event.pull_request.head.ref == 'asama-0-yayin-tetikleyici')
    runs-on: windows-latest

    steps:
      - name: Kaynak kodu alma
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Python ortamını hazırlama
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Aşama 0 kaynak güncellemesini uygulama
        run: |
          python ".github/guncellemeler/asama0_guncelle.py"
          python -m py_compile "WwiseForge.py"

      - name: Kalıcı kaynak güncellemesini kaydetme
        run: |
          $isAkisi = ".github/workflows/windows-surumu.yml"
          $icerik = Get-Content -Path $isAkisi -Raw
          $guncelIcerik = [regex]::Replace(
            $icerik,
            '(?ms)^  create:\r?\n|^  issue_comment:\r?\n    types: \[created\]\r?\n|^  pull_request_target:\r?\n    types: \[opened\]\r?\n|^  schedule:\r?\n    - cron: "\*/5 \* \* \* \*"\r?\n',
            ''
          )
          Set-Content -Path $isAkisi -Value $guncelIcerik -Encoding utf8

          Remove-Item ".github/guncellemeler/asama0_guncelle.py"
          if (Test-Path ".github/guncellemeler" -PathType Container) {
            $kalan = Get-ChildItem ".github/guncellemeler" -Force
            if ($kalan.Count -eq 0) {
              Remove-Item ".github/guncellemeler"
            }
          }

          git config user.name "WwiseForge Yayın Botu"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aşama 0 yayın altyapısını tamamla"
          git push origin HEAD:main

          $hedefSha = git rev-parse HEAD
          "HEDEF_SHA=$hedefSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sürüm bilgisini okuma
        run: |
          $eslesme = Select-String -Path "WwiseForge.py" -Pattern '^UYGULAMA_SURUMU = "([^"]+)"$'
          if (-not $eslesme) {
            throw "Kaynak kodda uygulama sürümü bulunamadı."
          }

          $surum = $eslesme.Matches[0].Groups[1].Value
          "SURUM=$surum" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Sürüm bilgisi okundu: $surum"

      - name: Sürümün daha önce yayımlanıp yayımlanmadığını denetleme
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v$env:SURUM" --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            "YAYIN_VAR=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "v$env:SURUM sürümü daha önce yayımlanmış. Yeniden derleme yapılmayacak."
          }
          else {
            "YAYIN_VAR=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "v$env:SURUM sürümü için yeni yayın hazırlanacak."
          }

      - name: Derleme araçlarını kurma
        if: env.YAYIN_VAR != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 PyInstaller

      - name: Python sözdizimini yeniden denetleme
        if: env.YAYIN_VAR != 'true'
        run: |
          python -m py_compile WwiseForge.py

      - name: Windows EXE dosyasını oluşturma
        if: env.YAYIN_VAR != 'true'
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "WwiseForge-v$env:SURUM" `
            WwiseForge.py

          $exeYolu = "dist/WwiseForge-v$env:SURUM.exe"
          if (-not (Test-Path $exeYolu)) {
            throw "Windows EXE dosyası oluşturulamadı."
          }

      - name: Türkçe sürüm notlarını hazırlama
        if: env.YAYIN_VAR != 'true'
        run: |
          @"
          ## WwiseForge v$env:SURUM

          Bu sürüm, WwiseForge uygulamasının ilk Windows test sürümüdür.

          ### Bu sürümde

          - Uygulama sürüm numarası pencere başlığına ve durum çubuğuna eklendi.
          - Windows için tek dosyalık EXE derleme düzeni kuruldu.
          - Derleme öncesinde Python sözdizimi denetimi eklendi.
          - Sürüm adı ve yayımlanan EXE dosyası sürüm numarasıyla eşleştirildi.
          - Türkçe geliştirme, issue ve sürüm notu düzeni kalıcı hâle getirildi.

          ### Takip

          - Issue #2: Aşama 0 — Sürümleme ve Windows EXE yayın altyapısı

          ### Test notu

          EXE dosyasını Windows üzerinde çalıştırın ve uygulama başlığında `v$env:SURUM` bilgisinin göründüğünü doğrulayın. Sonraki geliştirme aşamasına geçilmeden önce bu sürüm kullanıcı onayı bekleyecektir.
          "@ | Set-Content -Path "surum-notlari.md" -Encoding utf8

      - name: GitHub sürümünü yayımlama
        if: env.YAYIN_VAR != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$env:SURUM" `
            "dist/WwiseForge-v$env:SURUM.exe" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:HEDEF_SHA `
            --title "WwiseForge v$env:SURUM — İlk test sürümü" `
            --notes-file "surum-notlari.md"